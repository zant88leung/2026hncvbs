<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔥🦁火焰與獅子：勇者傳說</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
    <style>
        :root { --blue: #2393f5; --green: #1ec555; --orange: #f39c12; --purple: #8e44ad; --text: #2c3e50; }
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #eef2f3; color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .page { display: none; width: 100%; max-width: 500px; padding: 20px; box-sizing: border-box; }
        .page.active { display: block; }
        .game-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .mode-btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; margin-bottom: 10px; cursor: pointer; }
        .score-adjust-btn { padding: 5px 10px; margin: 2px; border: none; border-radius: 5px; cursor: pointer; color: white; font-size: 0.8em; }
    </style>
</head>
<body>

    <div id="login-section" class="page active">
        <div class="game-card">
            <h2>登入系統</h2>
            <input type="text" id="username" placeholder="學生 ID" style="width:100%; padding:10px; box-sizing:border-box; margin-bottom:10px;">
            <button onclick="loginUser()" style="width:100%; padding:10px; background:var(--blue); color:white; border:none; cursor:pointer;">登入</button>
        </div>
    </div>

    <div id="main-menu" class="page">
        <div id="status-bar" class="game-card" style="display:none; text-align:center;">👤 <span id="user-name"></span> | 💰 <span id="coin-count">0</span></div>
        <div class="menu-container">
            <button class="mode-btn" style="background:var(--blue)" onclick="openWeekSelector('verse')">🎤 背金句</button>
            <button class="mode-btn" style="background:var(--green)" onclick="openWeekSelector('quiz')">🧠 問答挑戰</button>
            <button id="admin-btn" class="mode-btn" style="background:var(--text); display:none" onclick="loadAdminPanel()">📊 管理台</button>
        </div>
    </div>

    <script>
        const UNIVERSAL_PASSWORD = "SummerCamp2026!";
        const auth = firebase.auth(); const db = firebase.firestore();

        function loginUser() {
            const username = document.getElementById('username').value.trim();
            if(!username) return alert('請輸入 ID');
            auth.signInWithEmailAndPassword(username + "@bible.local", UNIVERSAL_PASSWORD)
                .then(u => { bindUserData(u.user.uid); navigateTo('main-menu'); })
                .catch(e => alert("登入失敗"));
        }

        function bindUserData(uid) {
            db.collection("users").doc(uid).onSnapshot(doc => {
                if (doc.exists) {
                    currentUserDoc = doc.data();
                    document.getElementById('user-name').innerText = currentUserDoc.name;
                    document.getElementById('coin-count').innerText = currentUserDoc.coins;
                    document.getElementById('admin-btn').style.display = currentUserDoc.role === 'admin' ? 'block' : 'none';
                } else {
                    // 自動生成新使用者資料
                    db.collection("users").doc(uid).set({ name: document.getElementById('username').value, coins: 0, role: 'student' });
                }
            });
        }
    </script>
</body>
</html>
